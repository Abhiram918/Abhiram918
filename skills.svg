<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" width="820" height="580">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;display=swap');
    </style>
    <!-- scanline pattern -->
    <pattern id="scan" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="none"/>
      <rect y="2" width="1" height="2" fill="rgba(0,255,136,0.018)"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="820" height="580" rx="10" fill="#111111"/>
  <!-- scanlines -->
  <rect width="820" height="580" rx="10" fill="url(#scan)"/>
  <!-- top bar -->
  <rect width="820" height="38" rx="10" fill="#1a1a1a"/>
  <rect y="28" width="820" height="10" fill="#1a1a1a"/>
  <!-- traffic lights -->
  <circle cx="22" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="19" r="6" fill="#27c93f"/>
  <!-- title -->
  <text x="410" y="24" font-family="JetBrains Mono, monospace" font-size="11" fill="#555555" text-anchor="middle" letter-spacing="1">abhiram@dev — skills.sh</text>

  <!-- prompt line -->
  <text x="28" y="68" font-family="JetBrains Mono, monospace" font-size="13" fill="#00ff88">➜ ~/abhiram</text>
  <text x="148" y="68" font-family="JetBrains Mono, monospace" font-size="13" fill="#e0e0e0"> bash skills.sh</text>
  <text x="28" y="86" font-family="JetBrains Mono, monospace" font-size="12" fill="#444444"># loading skill modules... 6 found</text>

  <!-- ── 01 Languages & Frameworks ── -->
