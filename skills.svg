  <rect x="218" y="122" width="88" height="22" rx="3" fill="rgba(0,255,136,0.07)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
  <text x="262" y="137" font-family="JetBrains Mono, monospace" font-size="11" fill="#00ff88" text-anchor="middle">JavaScript</text>
