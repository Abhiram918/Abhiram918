<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 180" width="100%" height="100%">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#1A1A1A"/>
    </pattern>

    <style>
      /* Audio Waveform Animation */
      .bar {
        stroke: #FFFFFF;
        stroke-width: 4;
        stroke-linecap: round;
        animation-name: equalize;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        animation-direction: alternate;
      }
      
      @keyframes equalize {
        0% { transform: scaleY(0.7); opacity: 0.5; }
        100% { transform: scaleY(1); opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1500" height="180" fill="#000000"/>
  <rect width="1500" height="180" fill="url(#grid)" opacity="0.6"/>

  <line x1="200" y1="90" x2="1300" y2="90" stroke="#1A1A1A" stroke-width="2"/>

