  <text x="201" y="457" font-family="JetBrains Mono, monospace" font-size="11" fill="#f472b6" text-anchor="middle">Framer</text>

  <!-- status bar -->
  <line x1="28" y1="492" x2="792" y2="492" stroke="#1e1e1e" stroke-width="1"/>
  <!-- blinking dot -->
  <circle cx="36" cy="510" r="4" fill="#00ff88" opacity="0.9"/>
  <text x="48" y="515" font-family="JetBrains Mono, monospace" font-size="11" fill="#444444">6 modules · 25 skills loaded</text>
  <text x="380" y="515" font-family="JetBrains Mono, monospace" font-size="11" fill="#00ff88" font-weight="700" text-anchor="middle">[ OK ]</text>
  <text x="730" y="515" font-family="JetBrains Mono, monospace" font-size="11" fill="#444444">exit 0</text>
  <rect x="773" y="503" width="8" height="14" rx="1" fill="#00ff88"/>

  <!-- outer border glow -->
  <rect width="820" height="580" rx="10" fill="none" stroke="#00ff88" stroke-opacity="0.06" stroke-width="1"/>
</svg>