  <rect x="338" y="314" width="52" height="22" rx="3" fill="rgba(251,191,36,0.07)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
  <text x="364" y="329" font-family="JetBrains Mono, monospace" font-size="11" fill="#fbbf24" text-anchor="middle">Linux</text>
