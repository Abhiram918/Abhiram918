  <text x="266" y="393" font-family="JetBrains Mono, monospace" font-size="11" fill="#c084fc" text-anchor="middle">ORM Optimization</text>
  <!-- Modular Architecture -->
  <rect x="344" y="378" width="158" height="22" rx="3" fill="rgba(192,132,252,0.07)" stroke="rgba(192,132,252,0.2)" stroke-width="1"/>
  <text x="423" y="393" font-family="JetBrains Mono, monospace" font-size="11" fill="#c084fc" text-anchor="middle">Modular Architecture</text>

  <!-- ── 06 Design Tools ── -->
